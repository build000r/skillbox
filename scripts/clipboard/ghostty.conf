# Skillbox one-gesture paste seam. Ghostty emits a private sequence so the
# managed local tmux fragment can classify images, then performs its native
# paste action. Text therefore stays on Ghostty's normal bracketed-paste path;
# the helper injects only a securely materialized image reference.
keybind = super+v=unbind
keybind = super+v=text:\x1b[99~
keybind = chain=paste_from_clipboard
# Ctrl+V is an equivalent explicit gesture for terminal-first users and avoids
# the macOS Paste menu path entirely.
keybind = ctrl+v=text:\x1b[98~
