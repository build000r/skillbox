# Skillbox clipboard integration.
# Enables OSC52 text copy through local tmux, remote tmux, SSH, and mosh.

set -g set-clipboard on

# The d* launchers normally present xterm-256color to remote tmux; tmux*/screen*
# covers manual SSH from inside a local tmux session. Keep this idempotent so
# repeated tmux reloads do not accumulate duplicate feature entries.
set -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title:RGB,screen*:title,rxvt*:ignorefkeys,xterm-ghostty:clipboard:RGB,xterm-256color:clipboard:RGB,tmux*:clipboard:RGB,tmux-256color:clipboard:RGB,screen*:clipboard:RGB,screen-256color:clipboard:RGB"

set -g copy-command "$HOME/.local/bin/clipcopy"
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "$HOME/.local/bin/clipcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "$HOME/.local/bin/clipcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "$HOME/.local/bin/clipcopy"

set-environment -g COLORTERM "truecolor"