# Skillbox clipboard integration.
# Enables OSC52 text copy through local tmux, remote tmux, SSH, and mosh.

set -g set-clipboard on

# Append clipboard features without replacing the operator's existing
# terminal-features configuration.
set -ag terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title:RGB"
set -ag terminal-features "xterm-ghostty:clipboard:RGB"
set -ag terminal-features "xterm-256color:clipboard:RGB"
set -ag terminal-features "tmux*:clipboard:RGB"
set -ag terminal-features "tmux-256color:clipboard:RGB"
set -ag terminal-features "screen*:clipboard:RGB"
set -ag terminal-features "screen-256color:clipboard:RGB"

set -g copy-command "$HOME/.local/bin/clipcopy"
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "$HOME/.local/bin/clipcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "$HOME/.local/bin/clipcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "$HOME/.local/bin/clipcopy"

set-environment -g COLORTERM "truecolor"