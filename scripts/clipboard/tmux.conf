# Skillbox clipboard integration.
# Enables OSC52 text copy through local tmux, remote tmux, SSH, and mosh.

set -g set-clipboard on

# Append clipboard features once per tmux server without replacing the
# operator's existing terminal-features configuration. The user option is a
# server-scoped migration marker, so repeated reloads cannot accumulate them.
%if "#{!=:#{@skillbox_clipboard_features_v2},1}"
set -ag terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title:RGB"
set -ag terminal-features "xterm-ghostty:clipboard:RGB"
set -ag terminal-features "xterm-256color:clipboard:RGB"
set -ag terminal-features "tmux*:clipboard:RGB"
set -ag terminal-features "tmux-256color:clipboard:RGB"
set -ag terminal-features "screen*:clipboard:RGB"
set -ag terminal-features "screen-256color:clipboard:RGB"
set -g @skillbox_clipboard_features_v2 1
%endif

# Ghostty's managed Cmd+V emits this private key.  Capture pane/client/route
# formats at key-dispatch time so an asynchronous transfer can never follow a
# later focus change. With no registered route, Cmd+V performs no helper read
# and falls through to Ghostty's chained native paste action.
set -s user-keys[199] "\e[99~"
bind-key -n User199 run-shell -b 'route="#{@skillbox_paste_route}"; generation="#{@skillbox_paste_generation}"; if [ -n "$route" ] && [ -n "$generation" ]; then clipboard-smart-paste --pane "#{pane_id}" --client "#{client_name}" --route-path "$route" --generation "$generation"; fi'
set -s user-keys[198] "\e[98~"
# Ctrl+V has no Ghostty-native chained action. Preserve its ordinary terminal
# meaning outside a registered route by sending one literal ^V to the same pane.
bind-key -n User198 run-shell -b 'route="#{@skillbox_paste_route}"; generation="#{@skillbox_paste_generation}"; if [ -n "$route" ] && [ -n "$generation" ]; then clipboard-smart-paste --inject-text --pane "#{pane_id}" --client "#{client_name}" --route-path "$route" --generation "$generation"; else tmux send-keys -t "#{pane_id}" -H 16; fi'

set -g copy-command "$HOME/.local/bin/clipcopy"
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "$HOME/.local/bin/clipcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "$HOME/.local/bin/clipcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "$HOME/.local/bin/clipcopy"

set-environment -g COLORTERM "truecolor"
