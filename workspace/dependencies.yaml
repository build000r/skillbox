version: 1

home_mounts:
  - id: claude-config
    path: /home/sandbox/.claude
    required: false
    notes: Bind-mounted baseline Claude config for the workspace user.

  - id: codex-config
    path: /home/sandbox/.codex
    required: false
    notes: Bind-mounted baseline Codex config for the workspace user.

repo_workspaces:
  - id: sandbox-root
    path: /workspace/repos
    required: true
    notes: Clone or mount project repos here.

  - id: monoserver-root
    path: /monoserver
    required: false
    notes: Shared parent mount exposing sibling client repo roots from the host.

skill_roots:
  - id: local-skills
    path: /workspace/skills
    audience: local
    required: false
    notes: Only the skills that should ship with this box.

packaged_skill_bundles:
  - id: default-skills
    path: /workspace/default-skills
    source_manifest: /workspace/workspace/default-skills.manifest
    sources_config: /workspace/workspace/default-skills.sources.yaml
    required: false
    notes: Generated by scripts/03-skill-sync.sh from a pinned GitHub skills repo plus optional local bootstrap roots.

runtime_services:
  - id: internal-env-manager
    kind: orchestration
    owner: local
    path: /workspace/.env-manager
    required: true
    notes: Internal runtime manager for repos, logs, and dev-sanity.

  - id: workspace
    kind: terminal
    owner: local
    required: true
    notes: Primary container for SSH-first development.

  - id: api-stub
    kind: http
    owner: local
    required: false
    notes: Optional inspection surface for sandbox metadata.

  - id: web-stub
    kind: http
    owner: local
    required: false
    notes: Optional browser surface for proving the stack shape.
