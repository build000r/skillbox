version: 1

home_mounts:
  - id: claude-config
    path: /home/sandbox/.claude
    required: false
    notes: Bind-mounted baseline Claude config for the workspace user.

  - id: codex-config
    path: /home/sandbox/.codex
    required: false
    notes: Bind-mounted baseline Codex config for the workspace user.

  - id: local-home
    path: /home/sandbox/.local
    required: false
    notes: Bind-mounted local home tools and binaries managed by the runtime graph.

repo_workspaces:
  - id: sandbox-root
    path: /workspace/repos
    required: true
    notes: Clone or mount project repos here.

  - id: monoserver-root
    path: /monoserver
    required: false
    notes: Shared parent mount exposing sibling client repo roots from the host.

skill_roots:
  - id: local-skills
    path: /workspace/skills
    audience: local
    required: false
    notes: Only the skills that should ship with this box.

packaged_skill_bundles:
  - id: default-skills
    path: /workspace/default-skills
    source_manifest: /workspace/workspace/default-skills.manifest
    sources_config: /workspace/workspace/default-skills.sources.yaml
    required: false
    notes: Generated by scripts/03-skill-sync.sh from a pinned GitHub skills repo plus optional local bootstrap roots.

runtime_tasks:
  - id: app-bootstrap
    kind: bootstrap
    required: false
    notes: Optional one-shot bootstrap tasks that materialize repo-specific readiness before services start.

runtime_artifacts:
  - id: swimmers-bin
    path: /home/sandbox/.local/bin/swimmers
    required: false
    notes: Managed swimmers binary that can be installed from a pinned download URL without a sibling source checkout.

  - id: fwc-bin
    path: /home/sandbox/.local/bin/fwc
    required: false
    notes: >
      Flywheel connectors CLI. Serves 150+ external service connectors
      as MCP tools via fwc serve-mcp. Capability-gated, zone-scoped,
      with signed audit trails.

  - id: dcg-bin
    path: /home/sandbox/.local/bin/dcg
    required: false
    notes: >
      Destructive command guard binary. PreToolUse hook AND MCP server
      for proactive command safety checking.

connector_repos:
  - id: flywheel-connectors
    path: /workspace/repos/flywheel_connectors
    required: false
    notes: FCP source — 150 connector crates, SDK, mesh networking, crypto.

  - id: destructive-command-guard
    path: /workspace/repos/destructive_command_guard
    required: false
    notes: DCG source — 49+ rule packs, heredoc scanner, MCP server.

runtime_services:
  - id: internal-env-manager
    kind: orchestration
    owner: local
    path: /workspace/.env-manager
    required: true
    notes: Internal runtime manager for repos, artifacts, logs, and dev-sanity.

  - id: workspace
    kind: terminal
    owner: local
    required: true
    notes: Primary container for SSH-first development.

  - id: api-stub
    kind: http
    owner: local
    required: false
    notes: Optional inspection surface for sandbox metadata.

  - id: swimmers-server
    kind: tmux-api
    owner: local
    required: false
    notes: Optional swimmers API that runs inside the workspace container alongside tmux-backed agents.

  - id: web-stub
    kind: http
    owner: local
    required: false
    notes: Optional browser surface for proving the stack shape.

  - id: fwc-mcp
    kind: mcp
    owner: local
    required: false
    notes: >
      Flywheel connectors MCP server. Exposes GitHub, Slack, Linear,
      databases, cloud APIs, etc. as MCP tools for agents in the box.
      Activated by the connectors profile.

  - id: dcg-mcp
    kind: mcp
    owner: local
    required: false
    notes: >
      DCG MCP server. Agents can proactively check command safety
      via check_command, scan files for destructive patterns, and
      get explanations for why a pattern was flagged.
