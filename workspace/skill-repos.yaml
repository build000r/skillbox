# Shared default skill repo declarations.
#
# Each entry is either a GitHub repo (cloned into workspace/skill-repos/)
# or a local path (referenced directly). Skills are filtered-copied into
# agent homes (~/.claude/skills/, ~/.codex/skills/) on sync.

version: 2

# The default install set must stay within the skill-scope.yaml
# `global_allowlist` (skillbox-config). Task skills are activated on demand
# via `sbp skill activate <skill> --cwd <repo>`, not installed globally.
skill_repos:
  # Public multi-skill repo — pick the policy-allowed default set
  - repo: build000r/skills
    ref: main
    pick:
      - divide-and-conquer
      - lube
      - mmdx
      - skill-issue
      - smart

  # Operator-local skills (same convention as skill-repos-memory.yaml).
  - path: ../../../skills-private
    pick:
      - beads-br
      - beads-bv
      - beads-workflow
      - codebase-audit
      - git-stash-janitor
      - no-ragrets
      - project-status-mmdx
      - sbp
      - ui-fresh-eyes
