# Shared default skill repo declarations.
#
# Each entry is either a GitHub repo (cloned into workspace/skill-repos/)
# or a local path (referenced directly). Skills are filtered-copied into
# agent homes (~/.claude/skills/, ~/.codex/skills/) on sync.

version: 2

# The default install set must stay portable. Private/operator-only skills
# belong in a private overlay or external profile config, not in this public
# source tree. Task skills are activated on demand via
# `sbp skill activate <skill> --cwd <repo>`, not installed globally.
skill_repos:
  # Public multi-skill repo — pick the policy-allowed default set
  - repo: build000r/skills
    ref: main
    pick:
      - divide-and-conquer
      - lube
      - mmdx
      - project-status-mmdx
      - skill-issue
      - smart
