# Shared default skill repo declarations.
#
# Each entry is either a GitHub repo (cloned into workspace/skill-repos/)
# or a local path (referenced directly). Skills are filtered-copied into
# agent homes (~/.claude/skills/, ~/.codex/skills/) on sync.

version: 2

skill_repos:
  # Public multi-skill repo — pick the curated default set
  - repo: build000r/skills
    ref: main
    pick:
      - ask-cascade
      - build-vs-clone
      - describe
      - reproduce
      - commit

  # Local skills under active development
  - path: ../skills
    pick:
      - cass-memory
      - dev-sanity
      - skillbox-operator

  # Shared workflow skills from the main opensource skills repo
  - path: ../../skills
    pick:
      - cli-ergonomics
      - audit-plans
      - crap
      - divide-and-conquer
      - domain-planner
      - domain-reviewer
      - domain-scaffolder
      - mutate
      - oss-doc-audit
      - skill-issue

  # Private local skills that should ship with the default box setup
  - path: ../../../skills-private
    pick:
      - cass
      - changelog-md-workmanship
      - readme-writing
      - smart
