version: 2

selection: {}

core:
  repos:
    - id: skillbox-self
      kind: repo
      path: ${SKILLBOX_WORKSPACE_ROOT}
      required: true
      profiles:
        - core
      source:
        kind: bind
        path: ${ROOT_DIR}
      sync:
        mode: external
      notes: The bind-mounted skillbox repo itself.

    - id: managed-repos
      kind: workspace-root
      path: ${SKILLBOX_REPOS_ROOT}
      required: true
      profiles:
        - core
      source:
        kind: directory
      sync:
        mode: ensure-directory
      notes: Managed in-repo repos root for local box-only work.

  artifacts:
    - id: swimmers-bin
      kind: binary
      path: ${SKILLBOX_SWIMMERS_BIN}
      required: false
      profiles:
        - core
      source:
        kind: url
        url: ${SKILLBOX_SWIMMERS_DOWNLOAD_URL}
        sha256: ${SKILLBOX_SWIMMERS_DOWNLOAD_SHA256}
        executable: true
      sync:
        mode: download-if-missing
      notes: Core swimmers binary, installable from a pinned URL when one is configured.

    - id: dcg-bin
      kind: binary
      path: ${SKILLBOX_DCG_BIN}
      required: false
      profiles:
        - core
      source:
        kind: url
        url: ${SKILLBOX_DCG_DOWNLOAD_URL}
        sha256: ${SKILLBOX_DCG_DOWNLOAD_SHA256}
        executable: true
      sync:
        mode: download-if-missing
      notes: Destructive command guard binary. Protects agent sessions from irreversible shell commands.

  skills:
    - id: default-skills
      kind: packaged-skill-set
      required: true
      profiles:
        - core
      bundle_dir: ${SKILLBOX_WORKSPACE_ROOT}/default-skills
      manifest: ${SKILLBOX_WORKSPACE_ROOT}/workspace/default-skills.manifest
      sources_config: ${SKILLBOX_WORKSPACE_ROOT}/workspace/default-skills.sources.yaml
      lock_path: ${SKILLBOX_WORKSPACE_ROOT}/workspace/default-skills.lock.json
      sync:
        mode: unpack-bundles
      install_targets:
        - id: claude
          path: ${SKILLBOX_HOME_ROOT}/.claude/skills
        - id: codex
          path: ${SKILLBOX_HOME_ROOT}/.codex/skills
      notes: Install packaged default skill bundles into the managed Claude and Codex homes.

  services:
    - id: internal-env-manager
      kind: orchestration
      owner: local
      repo: skillbox-self
      path: ${SKILLBOX_WORKSPACE_ROOT}/.env-manager
      required: true
      profiles:
        - core
      command: python3 .env-manager/manage.py
      log: runtime
      notes: Internal control surface for repos, logs, and dev-sanity.

    - id: pulse
      kind: daemon
      owner: local
      repo: skillbox-self
      required: false
      profiles:
        - core
      command: python3 .env-manager/pulse.py run --interval ${SKILLBOX_PULSE_INTERVAL}
      healthcheck:
        type: path_exists
        path: ${SKILLBOX_LOG_ROOT}/runtime/pulse.pid
      log: runtime
      notes: >
        Live reconciliation daemon. Watches the runtime graph on a fixed
        interval, detects service crashes and check failures, auto-heals
        safe drift (restarts crashed services), and emits structured events
        to the journal for agent observability.

    - id: api-stub
      kind: http
      owner: local
      repo: skillbox-self
      required: false
      profiles:
        - surfaces
      command: python3 scripts/stub_api.py
      healthcheck:
        type: http
        url: http://127.0.0.1:${SKILLBOX_API_PORT}/health
        timeout_seconds: 0.5
      log: api
      notes: Optional sandbox inspection surface.

    - id: web-stub
      kind: http
      owner: local
      repo: skillbox-self
      required: false
      profiles:
        - surfaces
      command: python3 scripts/stub_web.py
      healthcheck:
        type: http
        url: http://127.0.0.1:${SKILLBOX_WEB_PORT}/
        timeout_seconds: 0.5
      log: web
      notes: Optional browser surface for sandbox inspection.

    - id: swimmers-server
      kind: tmux-api
      owner: local
      artifact: swimmers-bin
      required: false
      profiles:
        - swimmers
      command: /workspace/scripts/05-swimmers.sh --inside start
      healthcheck:
        type: path_exists
        path: ${SKILLBOX_LOG_ROOT}/swimmers/swimmers-server.pid
      log: swimmers
      notes: Workspace-local swimmers API that shares the tmux namespace with the agents.

  logs:
    - id: runtime
      path: ${SKILLBOX_LOG_ROOT}/runtime
      required: false
      profiles:
        - core
      retention_days: 14
      notes: Internal manager and reconciliation logs.

    - id: repos
      path: ${SKILLBOX_LOG_ROOT}/repos
      required: false
      profiles:
        - core
      retention_days: 14
      notes: Repo-local launch and health logs.

    - id: api
      path: ${SKILLBOX_LOG_ROOT}/api
      required: false
      profiles:
        - surfaces
      retention_days: 7
      notes: API surface logs.

    - id: web
      path: ${SKILLBOX_LOG_ROOT}/web
      required: false
      profiles:
        - surfaces
      retention_days: 7
      notes: Web surface logs.

    - id: swimmers
      path: ${SKILLBOX_LOG_ROOT}/swimmers
      required: false
      profiles:
        - swimmers
      retention_days: 14
      notes: swimmers install, process, and probe logs.

  checks:
    - id: workspace-root
      type: path_exists
      path: ${SKILLBOX_WORKSPACE_ROOT}
      required: true
      profiles:
        - core
      notes: The workspace must be mounted.

    - id: repos-root
      type: path_exists
      path: ${SKILLBOX_REPOS_ROOT}
      required: true
      profiles:
        - core
      notes: Managed repos root should exist.

    - id: skills-root
      type: path_exists
      path: ${SKILLBOX_SKILLS_ROOT}
      required: true
      profiles:
        - core
      notes: Local skills root should exist.

    - id: log-root
      type: path_exists
      path: ${SKILLBOX_LOG_ROOT}
      required: true
      profiles:
        - core
      notes: Top-level log root should exist.

    - id: monoserver-root
      type: path_exists
      path: ${SKILLBOX_MONOSERVER_ROOT}
      required: true
      profiles:
        - core
      notes: Shared parent mount exposing sibling repos from the host.

    - id: runtime-manager
      type: path_exists
      path: ${SKILLBOX_WORKSPACE_ROOT}/.env-manager/manage.py
      required: true
      profiles:
        - core
      notes: Internal manager entrypoint should exist.

    - id: dcg-binary
      type: path_exists
      path: ${SKILLBOX_DCG_BIN}
      required: false
      profiles:
        - core
      notes: Destructive command guard should be installed for agent safety.

    - id: fwc-binary
      type: path_exists
      path: ${SKILLBOX_FWC_BIN}
      required: false
      profiles:
        - connectors
      notes: Flywheel connectors CLI should be installed for the connectors profile.

connectors:
  repos:
    - id: flywheel-connectors
      kind: repo
      path: ${SKILLBOX_REPOS_ROOT}/flywheel_connectors
      required: false
      profiles:
        - connectors
      source:
        kind: git
        url: https://github.com/Dicklesworthstone/flywheel_connectors.git
        branch: main
      sync:
        mode: clone-if-missing
      notes: >
        Flywheel Connector Protocol — 150+ service connectors with
        cryptographic capability gating. Source checkout for building
        custom connectors and reading connector manifests.

    - id: destructive-command-guard
      kind: repo
      path: ${SKILLBOX_REPOS_ROOT}/destructive_command_guard
      required: false
      profiles:
        - connectors
      source:
        kind: git
        url: https://github.com/Dicklesworthstone/destructive_command_guard.git
        branch: main
      sync:
        mode: clone-if-missing
      notes: >
        DCG source checkout. Used to build the binary from source when
        no download URL is configured, and to inspect/extend rule packs.

  artifacts:
    - id: fwc-bin
      kind: binary
      path: ${SKILLBOX_FWC_BIN}
      required: false
      profiles:
        - connectors
      source:
        kind: url
        url: ${SKILLBOX_FWC_DOWNLOAD_URL}
        sha256: ${SKILLBOX_FWC_DOWNLOAD_SHA256}
        executable: true
      sync:
        mode: download-if-missing
      notes: >
        Flywheel connectors CLI. Provides fwc serve-mcp to expose
        connectors as MCP tools and fwc invoke for direct operation calls.

  services:
    - id: fwc-mcp
      kind: mcp
      owner: local
      artifact: fwc-bin
      required: false
      profiles:
        - connectors
      command: >
        ${SKILLBOX_FWC_BIN} serve-mcp
        --zone ${SKILLBOX_FWC_ZONE}
        --connectors ${SKILLBOX_FWC_CONNECTORS}
      healthcheck:
        type: process_running
        pattern: fwc serve-mcp
      depends_on: []
      log: connectors
      notes: >
        Flywheel connectors MCP server. Exposes configured connectors
        (GitHub, Slack, Linear, etc.) as MCP tools over stdio. Agents
        inside the box get authenticated access to external services
        through FCP's capability-gated security model.

    - id: dcg-mcp
      kind: mcp
      owner: local
      artifact: dcg-bin
      required: false
      profiles:
        - connectors
      command: ${SKILLBOX_DCG_BIN} mcp
      healthcheck:
        type: process_running
        pattern: dcg mcp
      depends_on: []
      log: connectors
      notes: >
        DCG MCP server. Exposes check_command, scan_file, and
        explain_pattern as agent tools. Agents can proactively verify
        whether a command is safe before attempting it, rather than
        being passively blocked by the PreToolUse hook.

  logs:
    - id: connectors
      path: ${SKILLBOX_LOG_ROOT}/connectors
      required: false
      profiles:
        - connectors
      retention_days: 14
      notes: Flywheel connectors and DCG MCP server logs.
