version: 1

client:
  id: personal
  label: Personal
  default_cwd: ${SKILLBOX_MONOSERVER_ROOT}
  repo_roots:
    - id: personal-root
      kind: repo-root
      path: ${SKILLBOX_MONOSERVER_ROOT}
      required: true
      profiles:
        - core
      source:
        kind: bind
      sync:
        mode: external
      notes: Shared personal monoserver root. In this repo that usually maps to the parent directory.
  skills:
    - id: personal-skills
      kind: packaged-skill-set
      required: false
      profiles:
        - core
      bundle_dir: ${SKILLBOX_CLIENTS_ROOT}/personal/bundles
      manifest: ${SKILLBOX_CLIENTS_ROOT}/personal/skills.manifest
      sources_config: ${SKILLBOX_CLIENTS_ROOT}/personal/skills.sources.yaml
      lock_path: ${SKILLBOX_CLIENTS_ROOT}/personal/skills.lock.json
      sync:
        mode: unpack-bundles
      install_targets:
        - id: claude
          path: ${SKILLBOX_HOME_ROOT}/.claude/skills
        - id: codex
          path: ${SKILLBOX_HOME_ROOT}/.codex/skills
      notes: Curated personal skills layered on top of the shared defaults.
  logs:
    - id: personal
      path: ${SKILLBOX_LOG_ROOT}/clients/personal
      required: false
      profiles:
        - core
      retention_days: 14
      notes: Client-scoped logs for the personal overlay.
  context:
    cwd_match:
      - ${SKILLBOX_MONOSERVER_ROOT}

    plans:
      plan_root: plans/released
      plan_draft: plans/draft
      plan_index: plans/INDEX.md
      session_plans: plans/sessions

    # deploy: {}      # populate with repo_slug_*, droplet_ssh, health_url_*, etc.
    # backend: {}     # populate with repo, domain_path, migration_tool, etc.
    # frontend: {}    # populate with repo, features_path, types_path, etc.
    # auth: {}        # populate with packages_root, python_packages, npm_packages

  checks:
    - id: personal-root
      type: path_exists
      path: ${SKILLBOX_MONOSERVER_ROOT}
      required: true
      profiles:
        - core
      notes: Personal overlay expects the shared monoserver root to be mounted.
