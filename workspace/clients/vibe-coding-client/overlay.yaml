version: 1

client:
  id: vibe-coding-client
  label: Vibe Coding Client
  default_cwd: ${SKILLBOX_MONOSERVER_ROOT}/vibe-coding-client
  repo_roots:
    - id: vibe-coding-client-root
      kind: repo-root
      path: ${SKILLBOX_MONOSERVER_ROOT}/vibe-coding-client
      required: true
      profiles:
        - core
      source:
        kind: bind
      sync:
        mode: external
      notes: Example client root mounted from a sibling repo directory.
  skills:
    - id: vibe-coding-client-skills
      kind: packaged-skill-set
      required: false
      profiles:
        - core
      bundle_dir: ${SKILLBOX_WORKSPACE_ROOT}/default-skills/clients/vibe-coding-client
      manifest: ${SKILLBOX_WORKSPACE_ROOT}/workspace/clients/vibe-coding-client/skills.manifest
      sources_config: ${SKILLBOX_WORKSPACE_ROOT}/workspace/clients/vibe-coding-client/skills.sources.yaml
      lock_path: ${SKILLBOX_WORKSPACE_ROOT}/workspace/clients/vibe-coding-client/skills.lock.json
      sync:
        mode: unpack-bundles
      install_targets:
        - id: claude
          path: ${SKILLBOX_HOME_ROOT}/.claude/skills
        - id: codex
          path: ${SKILLBOX_HOME_ROOT}/.codex/skills
      notes: Client-scoped skills for the vibe-coding-client overlay.
  logs:
    - id: vibe-coding-client
      path: ${SKILLBOX_LOG_ROOT}/clients/vibe-coding-client
      required: false
      profiles:
        - core
      retention_days: 14
      notes: Client-scoped logs for the vibe-coding-client overlay.
  checks:
    - id: vibe-coding-client-root
      type: path_exists
      path: ${SKILLBOX_MONOSERVER_ROOT}/vibe-coding-client
      required: true
      profiles:
        - core
      notes: The vibe-coding-client overlay expects a sibling vibe-coding-client directory.
