version: 1

client:
  id: vibe-coding-client
  label: Vibe Coding Client
  default_cwd: ${SKILLBOX_MONOSERVER_ROOT}/vibe-coding-client
  repo_roots:
    - id: vibe-coding-client-root
      kind: repo-root
      path: ${SKILLBOX_MONOSERVER_ROOT}/vibe-coding-client
      required: true
      profiles:
        - core
      source:
        kind: bind
      sync:
        mode: external
      notes: Example client root mounted from a sibling repo directory.
  skills:
    - id: vibe-coding-client-skills
      kind: packaged-skill-set
      required: false
      profiles:
        - core
      bundle_dir: ${SKILLBOX_CLIENTS_ROOT}/vibe-coding-client/bundles
      manifest: ${SKILLBOX_CLIENTS_ROOT}/vibe-coding-client/skills.manifest
      sources_config: ${SKILLBOX_CLIENTS_ROOT}/vibe-coding-client/skills.sources.yaml
      lock_path: ${SKILLBOX_CLIENTS_ROOT}/vibe-coding-client/skills.lock.json
      sync:
        mode: unpack-bundles
      install_targets:
        - id: claude
          path: ${SKILLBOX_HOME_ROOT}/.claude/skills
        - id: codex
          path: ${SKILLBOX_HOME_ROOT}/.codex/skills
      notes: Client-scoped skills for the vibe-coding-client overlay.

  # ---------------------------------------------------------------------------
  # Connectors — declare which FCP connectors this client is authorized to use.
  #
  # The box-level connectors profile provides the fwc-mcp and dcg-mcp services.
  # This section scopes them per-client: which connectors, which capabilities,
  # and any connector-specific config (channels, repos, tables, etc.).
  #
  # When this client is active, the agent gets MCP tools ONLY for the
  # connectors listed here, with the capabilities and scopes declared below.
  # ---------------------------------------------------------------------------
  connectors:
    - id: slack
      capabilities: [read, write, react]
      scopes:
        channels: ["#dev", "#alerts"]
        post_as: bot
      notes: >
        Read channel history, send messages, and react in scoped channels.
        Use for automated status updates, alert routing, and team comms.

    - id: github
      capabilities: [read, write]
      scopes:
        repos: ["org/*"]
        actions: [issues, pulls, comments, reviews]
      notes: >
        Full read/write on org repos — create issues, open PRs, post
        review comments. No admin/settings access.

    - id: linear
      capabilities: [read, write]
      scopes:
        teams: [engineering]
        actions: [issues, comments, labels]
      notes: >
        Track and update engineering issues. Read sprint state,
        create/update issues, add comments and labels.

    - id: postgres
      capabilities: [read]
      scopes:
        databases: [analytics]
        actions: [query]
      notes: >
        Read-only query access to the analytics database.
        No DDL, no writes. For reporting and investigation only.

  logs:
    - id: vibe-coding-client
      path: ${SKILLBOX_LOG_ROOT}/clients/vibe-coding-client
      required: false
      profiles:
        - core
      retention_days: 14
      notes: Client-scoped logs for the vibe-coding-client overlay.
  checks:
    - id: vibe-coding-client-root
      type: path_exists
      path: ${SKILLBOX_MONOSERVER_ROOT}/vibe-coding-client
      required: true
      profiles:
        - core
      notes: The vibe-coding-client overlay expects a sibling vibe-coding-client directory.
