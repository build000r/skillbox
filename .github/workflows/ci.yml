name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install PyYAML cryptography

      - name: Render outer model
        run: python3 scripts/04-reconcile.py render >/tmp/skillbox-render.json

      - name: Run unit tests
        run: python3 -m unittest discover -s tests
