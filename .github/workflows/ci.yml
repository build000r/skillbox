name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  RUFF_VERSION: "0.15.20"
  SHELLCHECK_PY_VERSION: "0.11.0.1"
  COVERAGE_VERSION: "7.15.0"
  PYYAML_VERSION: "6.0.3"
  CRYPTOGRAPHY_VERSION: "49.0.0"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/ci.yml

      - name: Install Ruff
        run: python -m pip install --disable-pip-version-check "ruff==${RUFF_VERSION}"

      - name: Run Ruff
        run: python -m ruff check .

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/ci.yml

      - name: Install ShellCheck
        run: python -m pip install --disable-pip-version-check "shellcheck-py==${SHELLCHECK_PY_VERSION}"

      - name: Run ShellCheck
        run: shellcheck --severity=warning scripts/*.sh install.sh

  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/ci.yml

      - name: Install Python dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            "PyYAML==${PYYAML_VERSION}" \
            "cryptography==${CRYPTOGRAPHY_VERSION}"

      - name: Render outer model
        run: python scripts/04-reconcile.py render >/tmp/skillbox-render.json

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: .github/workflows/ci.yml

      - name: Install Python dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            "PyYAML==${PYYAML_VERSION}" \
            "cryptography==${CRYPTOGRAPHY_VERSION}" \
            "coverage==${COVERAGE_VERSION}"

      - name: Run unit tests
        if: matrix.python-version != '3.12'
        run: python -m unittest discover -s tests

      - name: Run coverage
        if: matrix.python-version == '3.12'
        run: |
          python -m coverage erase
          python -m coverage run --source=scripts,.env-manager -m unittest discover -s tests
          python -m coverage report -m --skip-covered --fail-under=80
          python -m coverage xml -o coverage.xml

  compose:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose --env-file .env.example -f docker-compose.yml -f docker-compose.monoserver.yml config -q
