[tool.ruff]
target-version = "py311"
extend-exclude = [
    ".beads",
    ".buildooor",
    ".bv",
    ".claude",
    ".codex",
    ".ntm",
    ".pytest_cache",
    ".ruff_cache",
    ".skillbox-state",
    "builds",
    "data",
    "home",
    "invocations",
    "logs",
    "plans",
    "repos",
    "sand",
    "workspace",
]

[tool.ruff.lint]
# The runtime manager has import facades and tests that patch sys.path before
# local imports. Enforcing these rules would require broad behavioral rewrites.
ignore = ["E402", "F403", "F405"]
