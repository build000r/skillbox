name: ${SKILLBOX_NAME:-skillbox}

x-runtime-env: &runtime_env
  SKILLBOX_STORAGE_PROVIDER: ${SKILLBOX_STORAGE_PROVIDER:-local}
  SKILLBOX_STATE_ROOT: ${SKILLBOX_STATE_ROOT:-./.skillbox-state}
  SKILLBOX_STORAGE_FILESYSTEM: ${SKILLBOX_STORAGE_FILESYSTEM:-}
  SKILLBOX_STORAGE_REQUIRED: ${SKILLBOX_STORAGE_REQUIRED:-false}
  SKILLBOX_STORAGE_MIN_FREE_GB: ${SKILLBOX_STORAGE_MIN_FREE_GB:-0}
  SKILLBOX_WORKSPACE_ROOT: /workspace
  SKILLBOX_REPOS_ROOT: /workspace/repos
  SKILLBOX_SKILLS_ROOT: /workspace/skills
  SKILLBOX_LOG_ROOT: /workspace/logs
  SKILLBOX_HOME_ROOT: /home/sandbox
  SKILLBOX_MONOSERVER_ROOT: ${SKILLBOX_MONOSERVER_ROOT:-/monoserver}
  SKILLBOX_CLIENTS_ROOT: ${SKILLBOX_CLIENTS_ROOT:-/workspace/workspace/clients}
  SKILLBOX_CLIENTS_HOST_ROOT: ${SKILLBOX_CLIENTS_ROOT:-/workspace/workspace/clients}
  SKILLBOX_API_PORT: ${SKILLBOX_API_PORT:-8000}
  SKILLBOX_WEB_PORT: ${SKILLBOX_WEB_PORT:-3000}
  SKILLBOX_SWIMMERS_PORT: ${SKILLBOX_SWIMMERS_PORT:-3210}
  SKILLBOX_SWIMMERS_PUBLISH_HOST: ${SKILLBOX_SWIMMERS_PUBLISH_HOST:-127.0.0.1}
  SKILLBOX_SWIMMERS_REPO: ${SKILLBOX_SWIMMERS_REPO:-/monoserver/swimmers}
  SKILLBOX_SWIMMERS_INSTALL_DIR: ${SKILLBOX_SWIMMERS_INSTALL_DIR:-/home/sandbox/.local/bin}
  SKILLBOX_SWIMMERS_BIN: ${SKILLBOX_SWIMMERS_BIN:-/home/sandbox/.local/bin/swimmers}
  SKILLBOX_SWIMMERS_DOWNLOAD_URL: ${SKILLBOX_SWIMMERS_DOWNLOAD_URL:-}
  SKILLBOX_SWIMMERS_DOWNLOAD_SHA256: ${SKILLBOX_SWIMMERS_DOWNLOAD_SHA256:-}
  SKILLBOX_SWIMMERS_AUTH_MODE: ${SKILLBOX_SWIMMERS_AUTH_MODE:-}
  SKILLBOX_SWIMMERS_AUTH_TOKEN: ${SKILLBOX_SWIMMERS_AUTH_TOKEN:-}
  SKILLBOX_SWIMMERS_OBSERVER_TOKEN: ${SKILLBOX_SWIMMERS_OBSERVER_TOKEN:-}
  SKILLBOX_DCG_BIN: ${SKILLBOX_DCG_BIN:-/home/sandbox/.local/bin/dcg}
  SKILLBOX_DCG_DOWNLOAD_URL: ${SKILLBOX_DCG_DOWNLOAD_URL:-}
  SKILLBOX_DCG_DOWNLOAD_SHA256: ${SKILLBOX_DCG_DOWNLOAD_SHA256:-}
  SKILLBOX_DCG_PACKS: ${SKILLBOX_DCG_PACKS:-core.git,core.filesystem}
  SKILLBOX_DCG_MCP_PORT: ${SKILLBOX_DCG_MCP_PORT:-3220}
  SKILLBOX_FWC_BIN: ${SKILLBOX_FWC_BIN:-/home/sandbox/.local/bin/fwc}
  SKILLBOX_FWC_DOWNLOAD_URL: ${SKILLBOX_FWC_DOWNLOAD_URL:-}
  SKILLBOX_FWC_DOWNLOAD_SHA256: ${SKILLBOX_FWC_DOWNLOAD_SHA256:-}
  SKILLBOX_FWC_MCP_PORT: ${SKILLBOX_FWC_MCP_PORT:-3221}
  SKILLBOX_FWC_ZONE: ${SKILLBOX_FWC_ZONE:-work}
  SKILLBOX_FWC_CONNECTORS: ${SKILLBOX_FWC_CONNECTORS:-github,slack,linear}
  SKILLBOX_PULSE_INTERVAL: ${SKILLBOX_PULSE_INTERVAL:-30}

services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    image: skillbox:dev
    init: true
    stdin_open: true
    tty: true
    working_dir: /workspace
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: *runtime_env
    volumes:
      - .:/workspace
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/clients:${SKILLBOX_CLIENTS_ROOT:-/workspace/workspace/clients}
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/logs:/workspace/logs
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/home/.claude:/home/sandbox/.claude
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/home/.codex:/home/sandbox/.codex
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/home/.local:/home/sandbox/.local
    command: ["sleep", "infinity"]

  api:
    profiles: ["surfaces"]
    build:
      context: .
      dockerfile: Dockerfile
    image: skillbox:dev
    init: true
    working_dir: /workspace
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: *runtime_env
    volumes:
      - .:/workspace
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/clients:${SKILLBOX_CLIENTS_ROOT:-/workspace/workspace/clients}
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/logs:/workspace/logs
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/home/.claude:/home/sandbox/.claude
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/home/.codex:/home/sandbox/.codex
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/home/.local:/home/sandbox/.local
    command:
      - bash
      - -lc
      - >
        mkdir -p logs/api &&
        python3 scripts/stub_api.py 2>&1 | tee -a logs/api/api.log
    ports:
      - "127.0.0.1:${SKILLBOX_API_PORT:-8000}:8000"

  web:
    profiles: ["surfaces"]
    build:
      context: .
      dockerfile: Dockerfile
    image: skillbox:dev
    init: true
    working_dir: /workspace
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: *runtime_env
    volumes:
      - .:/workspace
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/clients:${SKILLBOX_CLIENTS_ROOT:-/workspace/workspace/clients}
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/logs:/workspace/logs
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/home/.claude:/home/sandbox/.claude
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/home/.codex:/home/sandbox/.codex
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/home/.local:/home/sandbox/.local
    command:
      - bash
      - -lc
      - >
        mkdir -p logs/web &&
        python3 scripts/stub_web.py 2>&1 | tee -a logs/web/web.log
    ports:
      - "127.0.0.1:${SKILLBOX_WEB_PORT:-3000}:3000"
