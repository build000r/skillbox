# Default monoserver mount: exposes entire parent directory.
# Replaced by per-client overrides when a client is focused.
services:
  workspace:
    volumes:
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/monoserver:${SKILLBOX_MONOSERVER_ROOT:-/monoserver}
  api:
    volumes:
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/monoserver:${SKILLBOX_MONOSERVER_ROOT:-/monoserver}
  web:
    volumes:
      - ${SKILLBOX_STATE_ROOT:-./.skillbox-state}/monoserver:${SKILLBOX_MONOSERVER_ROOT:-/monoserver}
